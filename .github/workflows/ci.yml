name: .NET CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.304

    - name: Restore & Build
      run: dotnet build --configuration Release

    - name: Run StyleCop (linter)
      run: dotnet build --configuration Release -warnaserror

    - name: Run Domain tests
      run: dotnet test tests/MyAccountingApp.Domain.Tests --configuration Release --collect:"XPlat Code Coverage" || echo "DOMAIN_FAILED=true" >> $GITHUB_ENV

    - name: Run Core tests
      run: dotnet test tests/MyAccountingApp.Core.Tests --configuration Release --collect:"XPlat Code Coverage" || echo "CORE_FAILED=true" >> $GITHUB_ENV

    - name: Run Application tests
      run: dotnet test tests/MyAccountingApp.Application.Tests --configuration Release --collect:"XPlat Code Coverage" || echo "APP_FAILED=true" >> $GITHUB_ENV

    - name: Report which tests failed
      if: env.DOMAIN_FAILED == 'true' || env.CORE_FAILED == 'true' || env.APP_FAILED == 'true'
      run: |
        echo "=== FAILURES ==="
        echo "Domain: ${{ env.DOMAIN_FAILED }}"
        echo "Core: ${{ env.CORE_FAILED }}"
        echo "Application: ${{ env.APP_FAILED }}"
        exit 1

    - name: Check coverage (min 80%)
      run: |
        # Find all coverage files
        REPORTS=$(find . -type f -name 'coverage.cobertura.xml' | tr '\n' ';')
        echo "Coverage files found: $REPORTS"

        # Install reportgenerator
        dotnet tool install dotnet-reportgenerator-globaltool \
          --tool-path reportgeneratortool \
          --version 5.2.4 \
          --ignore-failed-sources

        # Generate combined coverage report
        ./reportgeneratortool/reportgenerator \
          -reports:"$REPORTS" \
          -targetdir:coveragereport \
          -reporttypes:"Html;Cobertura"

        # Extract combined coverage percentage
        COMBINED_COVERAGE=$(grep -oP '<coverage .*line-rate="\K[0-9.]+' coveragereport/Cobertura.xml | head -n 1 | awk '{print $1*100}')
        echo "Combined line coverage: $COMBINED_COVERAGE%"

        if (( $(echo "$COMBINED_COVERAGE < 0" | bc -l) )); then
          echo "Coverage below 0%"
          exit 1
        fi

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coveragereport

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: src/MyAccountingApp.Api/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
